<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ruleta Pro</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:radial-gradient(circle at center,#0a0f1f,#02030a 70%);
color:white;
min-height:100vh;
}

.glass{
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border-radius:20px;
box-shadow:0 0 60px rgba(0,255,255,.1);
}

canvas{
border-radius:50%;
box-shadow:0 0 40px rgba(0,255,255,.25);
}

textarea{
resize:none;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-black border-bottom border-secondary">
<div class="container">
<span class="navbar-brand mb-0 h1">🎡 Sorteador Supremo</span>
</div>
</nav>

<!-- CONTENIDO -->
<div class="container py-5">

<div class="text-center mb-4">
<h2 class="fw-semibold">¿A quién vamos a mandar a pisar hoy? 😈</h2>
</div>

<div class="row justify-content-center">
<div class="col-lg-6">

<div class="glass p-4 text-center">

<canvas id="ruleta" width="420" height="420"></canvas>

<div class="mt-4">
<textarea id="opciones" class="form-control"
placeholder="Juan, Pedro, Ana"></textarea>
</div>

<button class="btn btn-info btn-lg mt-3 w-100 fw-bold"
onclick="spin()">GIRAR RULETA</button>

</div>

</div>
</div>
</div>

<!-- MODAL RESULTADO -->
<div class="modal fade" id="resultadoModal">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content bg-dark text-white border-info">

<div class="modal-header border-info">
<h5 class="modal-title">Resultado</h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body text-center">
<h2 id="ganador" class="text-info"></h2>
</div>

</div>
</div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* ===== EJEMPLO SIMPLE RULETA ===== */
const canvas=document.getElementById("ruleta");
const ctx=canvas.getContext("2d");
let angle=0;

function spin(){
angle+=Math.PI*4;
draw();

document.getElementById("ganador").textContent="Juan";
new bootstrap.Modal(document.getElementById("resultadoModal")).show();
}

function draw(){
ctx.clearRect(0,0,420,420);
ctx.beginPath();
ctx.arc(210,210,180,0,Math.PI*2);
ctx.fillStyle="cyan";
ctx.fill();
}

draw();

</script>

</body>
</html>
