<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta del Destino</title>

<style>

/* =============================
   RESET
============================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
}

/* =============================
   FONDO DINÁMICO PROFESIONAL
============================= */
body{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
color:white;
background:#05070f;
overflow:hidden;
}

/* partículas */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:
radial-gradient(circle at 20% 30%, #00ffff22 0 2px, transparent 3px),
radial-gradient(circle at 70% 80%, #ff00ff22 0 2px, transparent 3px),
radial-gradient(circle at 40% 60%, #00ff8822 0 2px, transparent 3px);
background-size:200px 200px;
animation:mover 60s linear infinite;
z-index:-1;
}

@keyframes mover{
from{transform:translate(0,0)}
to{transform:translate(-400px,-400px)}
}

/* =============================
   TITULO
============================= */
h1{
margin-top:25px;
font-size:28px;
letter-spacing:1px;
text-shadow:0 0 20px cyan;
}

/* =============================
   TARJETA GLASS
============================= */
.panel{
backdrop-filter:blur(20px);
background:rgba(255,255,255,0.06);
border-radius:20px;
padding:25px;
margin-top:15px;
box-shadow:
0 0 40px rgba(0,255,255,0.15),
inset 0 0 30px rgba(255,255,255,0.05);
}

/* =============================
   RULETA
============================= */
canvas{
border-radius:50%;
box-shadow:
0 0 60px rgba(0,255,255,0.3),
0 0 120px rgba(0,0,0,0.8) inset;
}

/* =============================
   INPUT
============================= */
textarea{
width:320px;
height:90px;
margin-top:15px;
border:none;
border-radius:12px;
padding:12px;
resize:none;
font-size:14px;
}

/* =============================
   BOTÓN PREMIUM
============================= */
button{
margin-top:18px;
padding:14px 36px;
font-size:16px;
border:none;
border-radius:40px;
cursor:pointer;
color:white;
font-weight:600;
background:linear-gradient(45deg,#00f5ff,#00ff88,#00f5ff);
background-size:300% 300%;
animation:gradiente 5s ease infinite;
box-shadow:0 0 25px #00ffee;
transition:0.25s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 60px #00ffee;
}

@keyframes gradiente{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* =============================
   MODAL GANADOR
============================= */
.modal{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.7);
opacity:0;
pointer-events:none;
transition:0.4s;
}

.modal.show{
opacity:1;
pointer-events:auto;
}

.card{
background:#0f172a;
padding:40px 60px;
border-radius:20px;
text-align:center;
box-shadow:0 0 60px cyan;
animation:zoom 0.4s ease;
}

@keyframes zoom{
from{transform:scale(0.5);opacity:0}
to{transform:scale(1)}
}

.ganador{
font-size:32px;
margin-top:10px;
color:#00ffcc;
}

</style>
</head>

<body>

<h1>¿A quién vamos a mandar a pisar hoy? 😈</h1>

<div class="panel">
<canvas id="ruleta" width="420" height="420"></canvas>
<br>
<textarea id="opciones" placeholder="Juan, Pedro, Ana"></textarea>
<br>
<button onclick="girar()">GIRAR RULETA</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="card">
<h2>🔥 RESULTADO 🔥</h2>
<div id="ganador" class="ganador"></div>
<br>
<button onclick="cerrarModal()">Cerrar</button>
</div>
</div>

<script>

/* =============================
   GUARDAR OPCIONES
============================= */
const textarea=document.getElementById("opciones");
textarea.value=localStorage.getItem("opciones")||"";
textarea.oninput=()=>localStorage.setItem("opciones",textarea.value);

/* =============================
   AUDIO
============================= */
function beep(freq,dur){
const ctx=new (window.AudioContext||window.webkitAudioContext)();
const osc=ctx.createOscillator();
osc.frequency.value=freq;
osc.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+dur);
}

/* =============================
   RULETA
============================= */
const canvas=document.getElementById("ruleta");
const ctx=canvas.getContext("2d");

let opciones=["Nadie"];
let angulo=0;
let girando=false;

function leer(){
opciones=textarea.value.split(",").map(o=>o.trim()).filter(o=>o);
if(opciones.length===0) opciones=["Nadie"];
}

function dibujar(){
const cx=210,cy=210,r=190;
const ang=2*Math.PI/opciones.length;
ctx.clearRect(0,0,420,420);

opciones.forEach((op,i)=>{
const ini=angulo+i*ang;
const fin=ini+ang;

ctx.beginPath();
ctx.moveTo(cx,cy);
ctx.arc(cx,cy,r,ini,fin);
ctx.fillStyle=`hsl(${i*360/opciones.length},85%,55%)`;
ctx.fill();

ctx.save();
ctx.translate(cx,cy);
ctx.rotate(ini+ang/2);
ctx.fillStyle="white";
ctx.font="bold 15px sans-serif";
ctx.fillText(op,r*0.6,5);
ctx.restore();
});

/* puntero */
ctx.fillStyle="red";
ctx.beginPath();
ctx.moveTo(210,8);
ctx.lineTo(200,35);
ctx.lineTo(220,35);
ctx.fill();
}

dibujar();

/* =============================
   GIRAR FÍSICA REALISTA
============================= */
function girar(){
if(girando)return;

leer();
girando=true;

let velocidad=Math.random()*0.25+0.45;

function frame(){
angulo+=velocidad;
velocidad*=0.985;

if(Math.random()<0.3) beep(180,0.02);

dibujar();

if(velocidad>0.002){
requestAnimationFrame(frame);
}else{
girando=false;
resultado();
}
}
frame();
}

/* =============================
   RESULTADO
============================= */
function resultado(){
const ang=2*Math.PI/opciones.length;
let normal=angulo%(2*Math.PI);
let i=opciones.length-Math.floor(normal/ang)-1;
if(i<0)i+=opciones.length;

document.getElementById("ganador").textContent=opciones[i];
document.getElementById("modal").classList.add("show");

beep(600,0.3);
confetti();
}

function cerrarModal(){
document.getElementById("modal").classList.remove("show");
}

/* =============================
   CONFETTI PRO
============================= */
function confetti(){
for(let i=0;i<120;i++){
const d=document.createElement("div");
d.style.position="fixed";
d.style.left=Math.random()*100+"vw";
d.style.top="-10px";
d.style.width="8px";
d.style.height="8px";
d.style.background=`hsl(${Math.random()*360},100%,50%)`;
d.style.transform="rotate("+Math.random()*360+"deg)";
d.style.transition="transform 3s linear, top 3s linear";
document.body.appendChild(d);
setTimeout(()=>{
d.style.top="110vh";
d.style.transform="rotate(720deg)";
},10);
setTimeout(()=>d.remove(),3000);
}
}

</script>
</body>
</html>
