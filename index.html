<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Casino Wheel 3D</title>

<style>
body{
margin:0;
background:#02030a;
color:white;
font-family:system-ui;
overflow:hidden;
}

/* CANVAS 3D */
canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* UI ENCIMA */
.ui{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:10;
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
padding:20px;
border-radius:16px;
box-shadow:0 0 60px rgba(0,255,255,.2);
text-align:center;
}

textarea{
width:300px;
height:80px;
border-radius:10px;
border:none;
padding:10px;
margin-top:10px;
}

button{
margin-top:10px;
padding:12px 30px;
border-radius:30px;
border:none;
cursor:pointer;
font-weight:600;
color:white;
background:linear-gradient(45deg,#00f5ff,#00ffa6);
box-shadow:0 0 25px #00ffee;
}

.result{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
font-size:28px;
text-shadow:0 0 20px cyan;
z-index:10;
}
</style>
</head>

<body>

<div class="ui">
<h3>🎡 ¿A quién vamos a mandar a pisar hoy?</h3>
<textarea id="names" placeholder="Juan, Pedro, Ana"></textarea><br>
<button onclick="spin()">GIRAR</button>
</div>

<div class="result" id="result"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12/dist/gsap.min.js"></script>

<script>

/* ========= ESCENA ========= */
const scene=new THREE.Scene();
scene.background=new THREE.Color("#02030a");

const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,3,7);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);

/* ========= LUCES ========= */
scene.add(new THREE.AmbientLight(0xffffff,.5));

const neon=new THREE.PointLight(0x00ffff,3,20);
neon.position.set(0,4,4);
scene.add(neon);

/* ========= RULETA ========= */
let options=["Nadie"];
const wheel=new THREE.Group();
scene.add(wheel);

function buildWheel(){
wheel.clear();

const segments=options.length;
const step=2*Math.PI/segments;

for(let i=0;i<segments;i++){
const geo=new THREE.CylinderGeometry(2,2,0.4,40,1,false,i*step,step);
const color=new THREE.Color().setHSL(i/segments,.9,.55);

const mat=new THREE.MeshStandardMaterial({
color:color,
emissive:color,
emissiveIntensity:.25,
metalness:.4,
roughness:.3
});

wheel.add(new THREE.Mesh(geo,mat));
}

/* centro */
wheel.add(new THREE.Mesh(
new THREE.CylinderGeometry(.4,.4,.6,40),
new THREE.MeshStandardMaterial({color:0x111111,metalness:1})
));
}
buildWheel();

/* ========= PUNTERO ========= */
const pointer=new THREE.Mesh(
new THREE.ConeGeometry(.2,.6,20),
new THREE.MeshStandardMaterial({color:0xff0000})
);
pointer.position.set(0,1.7,2);
pointer.rotation.x=Math.PI;
scene.add(pointer);

/* ========= GIRAR ========= */
function spin(){

const txt=document.getElementById("names").value;
options=txt.split(",").map(v=>v.trim()).filter(v=>v);
if(!options.length) options=["Nadie"];

buildWheel();

const winner=Math.floor(Math.random()*options.length);
const seg=2*Math.PI/options.length;

const target=
wheel.rotation.y+
Math.PI*6+
(Math.PI/2)-
winner*seg-
seg/2;

gsap.to(wheel.rotation,{
y:target,
duration:5,
ease:"power4.out",
onComplete:()=>{
document.getElementById("result").textContent="🔥 "+options[winner];
}
});
}

/* ========= LOOP ========= */
function animate(){
requestAnimationFrame(animate);
wheel.rotation.x=Math.sin(Date.now()*0.0005)*0.05;
renderer.render(scene,camera);
}
animate();

/* ========= RESPONSIVE ========= */
addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>
</body>
</html>
