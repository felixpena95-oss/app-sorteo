<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta Pro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}

body{
background:radial-gradient(circle at center,#0a0f1f,#02030a 70%);
color:white;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
overflow:hidden;
}

h1{
margin-top:20px;
font-weight:600;
letter-spacing:.5px;
text-shadow:0 0 25px cyan;
}

.panel{
margin-top:15px;
padding:25px;
border-radius:20px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
box-shadow:0 0 60px rgba(0,255,255,.15);
}

canvas{
border-radius:50%;
}

textarea{
width:340px;
height:90px;
margin-top:15px;
border-radius:12px;
border:none;
padding:12px;
font-size:14px;
}

button{
margin-top:15px;
padding:14px 38px;
border-radius:40px;
border:none;
cursor:pointer;
font-size:16px;
font-weight:600;
color:white;
background:linear-gradient(45deg,#00f5ff,#00ffa6);
box-shadow:0 0 25px #00ffee;
transition:.25s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 60px #00ffee;
}

/* modal */
.modal{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.75);
opacity:0;
pointer-events:none;
transition:.3s;
}

.modal.show{
opacity:1;
pointer-events:auto;
}

.card{
background:#0b132b;
padding:40px 60px;
border-radius:18px;
box-shadow:0 0 80px cyan;
text-align:center;
}

.ganador{
font-size:32px;
margin-top:10px;
color:#00ffd0;
}
</style>
</head>

<body>

<h1>¿A quién vamos a mandar a pisar hoy? 😈</h1>

<div class="panel">
<canvas id="ruleta" width="460" height="460"></canvas>
<br>
<textarea id="opciones" placeholder="Juan, Pedro, Ana"></textarea>
<br>
<button onclick="spin()">GIRAR</button>
</div>

<div id="modal" class="modal">
<div class="card">
<h2>RESULTADO</h2>
<div id="ganador" class="ganador"></div>
<br>
<button onclick="cerrar()">Cerrar</button>
</div>
</div>

<script>
/* ===============================
   CONFIG
================================ */
const canvas=document.getElementById("ruleta");
const ctx=canvas.getContext("2d");
const cx=230, cy=230, radius=200;

/* ===============================
   ESTADO FÍSICO
================================ */
let angle=0;
let angularVel=0;
let targetAngle=null;
let spinning=false;

/* ===============================
   OPCIONES
================================ */
const textarea=document.getElementById("opciones");
textarea.value=localStorage.getItem("ops")||"";
textarea.oninput=()=>localStorage.setItem("ops",textarea.value);

let options=["Nadie"];

/* ===============================
   MOTOR DE PARTÍCULAS
================================ */
const particles=[];

function spawnParticles(){
for(let i=0;i<150;i++){
particles.push({
x:cx,
y:cy,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6-4,
life:1,
size:4+Math.random()*4,
rot:Math.random()*6
});
}
}

/* ===============================
   AUDIO SINTÉTICO
================================ */
function beep(f,t){
const a=new (window.AudioContext||window.webkitAudioContext)();
const o=a.createOscillator();
o.frequency.value=f;
o.connect(a.destination);
o.start();
o.stop(a.currentTime+t);
}

/* ===============================
   DIBUJAR RULETA PROFESIONAL
================================ */
function drawWheel(){

const seg=2*Math.PI/options.length;

/* motion blur */
ctx.globalAlpha=.15;
ctx.drawImage(canvas,0,0);
ctx.globalAlpha=1;

/* base */
ctx.clearRect(0,0,canvas.width,canvas.height);

/* glow exterior */
const glow=ctx.createRadialGradient(cx,cy,radius*.8,cx,cy,radius*1.2);
glow.addColorStop(0,"rgba(0,255,255,.3)");
glow.addColorStop(1,"transparent");
ctx.fillStyle=glow;
ctx.beginPath();
ctx.arc(cx,cy,radius*1.2,0,Math.PI*2);
ctx.fill();

/* sectores */
options.forEach((o,i)=>{
const a1=angle+i*seg;
const a2=a1+seg;

const grad=ctx.createLinearGradient(
cx+Math.cos(a1)*radius,
cy+Math.sin(a1)*radius,
cx+Math.cos(a2)*radius,
cy+Math.sin(a2)*radius
);
grad.addColorStop(0,`hsl(${i*360/options.length},90%,60%)`);
grad.addColorStop(1,`hsl(${i*360/options.length},90%,40%)`);

ctx.beginPath();
ctx.moveTo(cx,cy);
ctx.arc(cx,cy,radius,a1,a2);
ctx.fillStyle=grad;
ctx.fill();

/* texto */
ctx.save();
ctx.translate(cx,cy);
ctx.rotate(a1+seg/2);
ctx.fillStyle="white";
ctx.font="bold 16px sans-serif";
ctx.fillText(o,radius*.65,6);
ctx.restore();
});

/* centro */
ctx.beginPath();
ctx.arc(cx,cy,18,0,Math.PI*2);
ctx.fillStyle="#111";
ctx.fill();

/* puntero con rebote */
const bounce=Math.sin(performance.now()*0.02)*4;
ctx.fillStyle="red";
ctx.beginPath();
ctx.moveTo(cx,10+bounce);
ctx.lineTo(cx-12,40+bounce);
ctx.lineTo(cx+12,40+bounce);
ctx.fill();
}

/* ===============================
   ACTUALIZAR FÍSICA
================================ */
let last=performance.now();

function update(){

const now=performance.now();
const dt=(now-last)/1000;
last=now;

/* easing hacia objetivo */
if(spinning){
const diff=targetAngle-angle;
angularVel+=diff*4*dt;
angularVel*=0.985;
angle+=angularVel;

if(Math.abs(diff)<0.002 && Math.abs(angularVel)<0.002){
spinning=false;
angularVel=0;
finish();
}
}

/* partículas */
particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;
p.vy+=9.8*dt*0.4;
p.life-=dt*0.5;
});

for(let i=particles.length-1;i>=0;i--){
if(particles[i].life<=0) particles.splice(i,1);
}

/* dibujar */
drawWheel();

/* dibujar partículas */
particles.forEach(p=>{
ctx.globalAlpha=p.life;
ctx.fillStyle=`hsl(${Math.random()*360},100%,60%)`;
ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();
ctx.globalAlpha=1;
});

requestAnimationFrame(update);
}
update();

/* ===============================
   GIRAR PROFESIONAL
================================ */
function spin(){

if(spinning)return;

options=textarea.value.split(",").map(v=>v.trim()).filter(v=>v);
if(!options.length) options=["Nadie"];

const seg=2*Math.PI/options.length;

/* elegir ganador ANTES */
const winnerIndex=Math.floor(Math.random()*options.length);

/* calcular ángulo exacto */
const spins=6;
targetAngle=
spins*2*Math.PI +
(Math.PI/2) - winnerIndex*seg - seg/2;

spinning=true;
spawnParticles();
}

/* ===============================
   RESULTADO
================================ */
function finish(){

const seg=2*Math.PI/options.length;
const normalized=(angle%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
let i=Math.floor(((Math.PI/2)-normalized)/seg);
i=(i%options.length+options.length)%options.length;

document.getElementById("ganador").textContent=options[i];
document.getElementById("modal").classList.add("show");
beep(700,.4);
}

/* ===============================
   MODAL
================================ */
function cerrar(){
document.getElementById("modal").classList.remove("show");
}

</script>
</body>
</html>
